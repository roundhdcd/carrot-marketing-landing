<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:600px;height:600px;overflow:hidden;background:#1a0f0a;font-family:Pretendard,sans-serif;display:flex;align-items:center;justify-content:center}
  .wrap{width:600px;height:600px;position:relative;display:flex;flex-direction:column;justify-content:center;padding:52px 48px;background:linear-gradient(140deg,#1a0f0a 0%,#2d1507 60%,#1a0f0a 100%)}
  .bg-circle{position:absolute;border-radius:50%;background:radial-gradient(circle,#FF6F34 0%,transparent 70%);opacity:.22}
  .c1{width:400px;height:400px;top:-120px;right:-80px}
  .c2{width:280px;height:280px;bottom:-60px;left:-60px;opacity:.12}
  .tag{display:inline-flex;align-items:center;gap:8px;background:rgba(255,111,52,.2);border:1.5px solid rgba(255,111,52,.5);color:#FF6F34;font-size:15px;font-weight:700;padding:7px 16px;border-radius:999px;margin-bottom:22px;position:relative;z-index:2}
  .main{font-size:52px;font-weight:900;color:#fff;line-height:1.18;letter-spacing:-.02em;position:relative;z-index:2}
  .main .o{color:#FF6F34}
  .sub{font-size:18px;color:rgba(255,255,255,.7);margin-top:16px;line-height:1.6;position:relative;z-index:2}
  .stat-row{display:flex;gap:20px;margin-top:32px;position:relative;z-index:2}
  .stat{background:rgba(255,255,255,.07);border:1px solid rgba(255,111,52,.3);border-radius:14px;padding:12px 18px;text-align:center}
  .stat .n{font-size:24px;font-weight:800;color:#FF6F34}
  .stat .l{font-size:12px;color:rgba(255,255,255,.6);margin-top:3px}
  .bottom{position:absolute;bottom:40px;left:48px;right:48px;z-index:2;display:flex;justify-content:space-between;align-items:center}
  .brand{font-size:18px;font-weight:800;color:rgba(255,255,255,.5);display:flex;align-items:center;gap:6px}
  .cta{background:#FF6F34;color:#fff;font-size:16px;font-weight:800;padding:12px 24px;border-radius:999px}
</style>
</head>
<body>
<div class="wrap">
  <div class="bg-circle c1"></div>
  <div class="bg-circle c2"></div>
  <div class="tag">🥕 당근마케팅 대행</div>
  <div class="main">당근 맡기니까<br><span class="o">단골이</span> 생겼습니다.</div>
  <div class="sub">사장님은 본업에만 집중하세요.<br>당근 운영은 저희가 합니다.</div>
  <div class="stat-row">
    <div class="stat"><div class="n">+320%</div><div class="l">평균 매출 상승</div></div>
    <div class="stat"><div class="n">5배</div><div class="l">문의 전환율</div></div>
    <div class="stat"><div class="n">24h</div><div class="l">세팅 완료</div></div>
  </div>
  <div class="bottom">
    <div class="brand">🥕 당근부스트</div>
    <div class="cta">무료 진단 받기</div>
  </div>
</div>
</body>
</html>
